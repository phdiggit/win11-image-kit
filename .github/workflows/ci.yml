name: Windows CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - codex/**

jobs:
  validate:
    name: Validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell 7 version
        shell: pwsh
        run: |
          $PSVersionTable

      - name: Install PowerShell test modules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Repository PSGallery -Force -SkipPublisherCheck -MinimumVersion 5.5.0 -Confirm:$false
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -Confirm:$false
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Import-Module PSScriptAnalyzer -Force

      - name: Show Windows PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Load PowerShell test modules in Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $pwshModulePath = Join-Path -Path $HOME -ChildPath "Documents\PowerShell\Modules"
          $env:PSModulePath = "$pwshModulePath;$env:PSModulePath"
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Import-Module PSScriptAnalyzer -Force

      - name: Run JSON parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path manifests,schemas -Recurse -Filter *.json | ForEach-Object {
              Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Run PowerShell parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 | ForEach-Object {
              [scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8)) | Out-Null
          }

      - name: Run project config validation with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\validate\Test-ProjectConfig.ps1

      - name: Run PSScriptAnalyzer with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module PSScriptAnalyzer -Force
          $results = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings .\PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              Write-Warning ("PSScriptAnalyzer reported {0} diagnostics. This baseline reports diagnostics without blocking CI." -f $results.Count)
          } else {
              Write-Host "PSScriptAnalyzer reported 0 diagnostics."
          }

      - name: Run Pester tests with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path tests/pester -CI

      - name: Run JSON parse check with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path manifests,schemas -Recurse -Filter *.json | ForEach-Object {
              Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Run PowerShell parse check with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 | ForEach-Object {
              [scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8)) | Out-Null
          }

      - name: Run project config validation with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\validate\Test-ProjectConfig.ps1

      - name: Run PSScriptAnalyzer with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module PSScriptAnalyzer -Force
          $results = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings .\PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              Write-Warning ("PSScriptAnalyzer reported {0} diagnostics. This baseline reports diagnostics without blocking CI." -f $results.Count)
          } else {
              Write-Host "PSScriptAnalyzer reported 0 diagnostics."
          }

      - name: Run Pester tests with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path tests/pester -CI
