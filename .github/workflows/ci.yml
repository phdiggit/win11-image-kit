name: Windows CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Windows PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Show Windows PowerShell test modules
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-Module -ListAvailable Pester, PSScriptAnalyzer | Select-Object Name, Version, Path | Format-Table -AutoSize

      - name: Run JSON parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path manifests,schemas -Recurse -Filter *.json | ForEach-Object {
              Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Run PowerShell parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 | ForEach-Object {
              [scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8)) | Out-Null
          }

      - name: Run project config validation with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\validate\Test-ProjectConfig.ps1

      - name: Run PSScriptAnalyzer with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) {
              Write-Warning "PSScriptAnalyzer is not available on this runner. This baseline reports the missing module without blocking CI."
              return
          }
          $results = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings .\PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              Write-Warning ("PSScriptAnalyzer reported {0} diagnostics. This baseline reports diagnostics without blocking CI." -f $results.Count)
          } else {
              Write-Host "PSScriptAnalyzer reported 0 diagnostics."
          }

      - name: Run fast Pester tests with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $fastPesterPaths = @(
              "tests/pester/New-StepResult.Tests.ps1",
              "tests/pester/OrchestratorStepResults.Tests.ps1",
              "tests/pester/SoftwarePolicy.Tests.ps1",
              "tests/pester/SoftwareSourcePolicyRuntime.Tests.ps1",
              "tests/pester/SoftwarePackageResults.Tests.ps1",
              "tests/pester/SoftwarePackageTestCommand.Tests.ps1",
              "tests/pester/PackageReportLinks.Tests.ps1",
              "tests/pester/ReportBlockingSummary.Tests.ps1",
              "tests/pester/SoftwareFailurePolicyRuntime.Tests.ps1",
              "tests/pester/ServiceStateVerification.Tests.ps1",
              "tests/pester/JunctionStateVerification.Tests.ps1",
              "tests/pester/JunctionTransactionPreflight.Tests.ps1",
              "tests/pester/JunctionTransactionExecution.Tests.ps1",
              "tests/pester/Issue7JunctionAcceptance.Tests.ps1",
              "tests/pester/Issue7ClosePrep.Tests.ps1",
              "tests/pester/Issue7MainValidationEvidence.Tests.ps1",
              "tests/pester/DefenderAppxStateVerification.Tests.ps1",
              "tests/pester/DefenderExclusionPolicy.Tests.ps1",
              "tests/pester/DefenderExclusionState.Tests.ps1",
              "tests/pester/DefenderExclusionPostDeploy.Tests.ps1",
              "tests/pester/Issue8DefenderAcceptance.Tests.ps1",
              "tests/pester/Issue8ClosePrep.Tests.ps1",
              "tests/pester/Issue8MainValidationEvidence.Tests.ps1",
              "tests/pester/SysprepAppxInventory.Tests.ps1",
              "tests/pester/SysprepAppxReadiness.Tests.ps1",
              "tests/pester/SysprepAppxReport.Tests.ps1",
              "tests/pester/Issue9SysprepAppxGate.Tests.ps1",
              "tests/pester/Issue9SysprepAppxAcceptance.Tests.ps1",
              "tests/pester/Issue9ClosePrep.Tests.ps1",
              "tests/pester/Issue9MainValidationEvidence.Tests.ps1",
              "tests/pester/ContextScopeSchema.Tests.ps1",
              "tests/pester/ContextScopeResolver.Tests.ps1",
              "tests/pester/ContextScopeSafety.Tests.ps1",
              "tests/pester/ContextScopeReport.Tests.ps1",
              "tests/pester/Issue10ContextScope.Tests.ps1",
              "tests/pester/Issue10ContextScopeAcceptance.Tests.ps1",
              "tests/pester/Issue10ClosePrep.Tests.ps1",
              "tests/pester/Issue10MainValidationEvidence.Tests.ps1",
              "tests/pester/CapabilityRegistrySchema.Tests.ps1",
              "tests/pester/CapabilityRegistryConsistency.Tests.ps1",
              "tests/pester/CapabilityRegistryReport.Tests.ps1",
              "tests/pester/Issue11CapabilityRegistry.Tests.ps1",
              "tests/pester/Issue11CapabilityRegistryAcceptance.Tests.ps1",
              "tests/pester/BuildLockSchema.Tests.ps1",
              "tests/pester/BuildLockHash.Tests.ps1",
              "tests/pester/BuildLockValidation.Tests.ps1",
              "tests/pester/BuildLockReport.Tests.ps1",
              "tests/pester/Issue12BuildLock.Tests.ps1",
              "tests/pester/Issue12BuildLockAcceptance.Tests.ps1",
              "tests/pester/Issue12ClosePrep.Tests.ps1",
              "tests/pester/Issue12MainValidationEvidence.Tests.ps1",
              "tests/pester/EnsureStateSchema.Tests.ps1",
              "tests/pester/EnsureStatePlan.Tests.ps1",
              "tests/pester/EnsureStateReport.Tests.ps1",
              "tests/pester/EnsureStateValidation.Tests.ps1",
              "tests/pester/Issue13EnsureState.Tests.ps1",
              "tests/pester/Issue13EnsureStateAcceptance.Tests.ps1",
              "tests/pester/Issue13ClosePrep.Tests.ps1",
              "tests/pester/Issue13MainValidationEvidence.Tests.ps1",
              "tests/pester/Issue14QualityGates.Tests.ps1",
              "tests/pester/Issue14CiPolicy.Tests.ps1",
              "tests/pester/Issue14PesterInventory.Tests.ps1",
              "tests/pester/Issue14AnalyzerPolicy.Tests.ps1",
              "tests/pester/Issue11ClosePrep.Tests.ps1",
              "tests/pester/Issue11MainValidationEvidence.Tests.ps1",
              "tests/pester/UserExperienceStateVerification.Tests.ps1",
              "tests/pester/DryRunAcceptanceBaseline.Tests.ps1",
              "tests/pester/Issue6AcceptanceAudit.Tests.ps1",
              "tests/pester/Issue6ClosePrep.Tests.ps1",
              "tests/pester/Issue6MainValidationEvidence.Tests.ps1",
              "tests/pester/Issue6CompletionSummary.Tests.ps1"
          )
          $pester = Import-Module Pester -Force -PassThru
          if ($pester.Version.Major -ge 5) {
              Invoke-Pester -Path $fastPesterPaths -CI
          } else {
              Invoke-Pester -Path $fastPesterPaths
          }

  full-validate:
    name: Full Validate
    if: github.event_name != 'pull_request'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell 7 version
        shell: pwsh
        run: |
          $PSVersionTable

      - name: Show Windows PowerShell version
        shell: powershell
        run: |
          $PSVersionTable

      - name: Show Windows PowerShell test modules
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-Module -ListAvailable Pester, PSScriptAnalyzer | Select-Object Name, Version, Path | Format-Table -AutoSize

      - name: Run JSON parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path manifests,schemas -Recurse -Filter *.json | ForEach-Object {
              Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Run PowerShell parse check with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 | ForEach-Object {
              [scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8)) | Out-Null
          }

      - name: Run project config validation with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\validate\Test-ProjectConfig.ps1

      - name: Run PSScriptAnalyzer with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) {
              Write-Warning "PSScriptAnalyzer is not available on this runner. This baseline reports the missing module without blocking CI."
              return
          }
          $results = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings .\PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              Write-Warning ("PSScriptAnalyzer reported {0} diagnostics. This baseline reports diagnostics without blocking CI." -f $results.Count)
          } else {
              Write-Host "PSScriptAnalyzer reported 0 diagnostics."
          }

      - name: Run Pester tests with Windows PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $pester = Import-Module Pester -Force -PassThru
          if ($pester.Version.Major -ge 5) {
              Invoke-Pester -Path tests/pester -CI
          } else {
              Invoke-Pester -Path tests/pester
          }

      - name: Run JSON parse check with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path manifests,schemas -Recurse -Filter *.json | ForEach-Object {
              Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8 | ConvertFrom-Json | Out-Null
          }

      - name: Run PowerShell parse check with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Get-ChildItem -Path scripts -Recurse -Filter *.ps1 | ForEach-Object {
              [scriptblock]::Create((Get-Content -LiteralPath $_.FullName -Raw -Encoding UTF8)) | Out-Null
          }

      - name: Run project config validation with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & .\scripts\validate\Test-ProjectConfig.ps1

      - name: Run PSScriptAnalyzer with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (-not (Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) {
              Write-Warning "PSScriptAnalyzer is not available on this runner. This baseline reports the missing module without blocking CI."
              return
          }
          $results = @(Invoke-ScriptAnalyzer -Path scripts -Recurse -Settings .\PSScriptAnalyzerSettings.psd1)
          if ($results.Count -gt 0) {
              $results | Format-Table -AutoSize
              Write-Warning ("PSScriptAnalyzer reported {0} diagnostics. This baseline reports diagnostics without blocking CI." -f $results.Count)
          } else {
              Write-Host "PSScriptAnalyzer reported 0 diagnostics."
          }

      - name: Run Pester tests with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pester = Import-Module Pester -Force -PassThru -ErrorAction SilentlyContinue
          if ($null -eq $pester) {
              Write-Warning "Pester is not available in PowerShell 7 on this runner. Windows PowerShell runs the Pester baseline in this workflow."
              return
          }
          if ($pester.Version.Major -ge 5) {
              Invoke-Pester -Path tests/pester -CI
          } else {
              Invoke-Pester -Path tests/pester
          }
